<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Studio - Scarcity Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-area {
            width: 360px;
            height: 640px; /* Rasio 9:16 TikTok */
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .scarcity-overlay {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            text-align: center;
        }
        .flash-sale-bg {
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="flex h-screen">
        <!-- Sidebar Kontrol -->
        <aside class="w-1/3 bg-gray-800 p-6 overflow-y-auto border-r border-gray-700">
            <h1 class="text-2xl font-bold mb-6 text-pink-500">Live Scarcity Editor</h1>
            
            <!-- Pengaturan Template -->
            <div class="mb-8">
                <label class="block text-sm font-medium mb-2">Pilih Template Scarcity</label>
                <select id="templateSelect" class="w-full bg-gray-700 p-2 rounded border border-gray-600 outline-none" onchange="updateTemplate()">
                    <option value="flash-sale">⚡ Flash Sale (Urgent)</option>
                    <option value="promo-gajian">💰 Promo Tanggal Muda/Gajian</option>
                    <option value="tanggal-tua">📉 Promo Penyelamat Tanggal Tua</option>
                    <option value="custom">🎨 Custom Design</option>
                </select>
            </div>

            <!-- Editor Konten -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Judul Promo</label>
                    <input type="text" id="promoTitle" value="FLASH SALE TERBATAS!" class="w-full bg-gray-700 p-2 rounded outline-none" oninput="syncPreview()">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Sub-teks (Call to Action)</label>
                    <input type="text" id="promoSub" value="Hanya untuk 10 orang pertama!" class="w-full bg-gray-700 p-2 rounded outline-none" oninput="syncPreview()">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Warna Background</label>
                    <input type="color" id="bgColor" value="#ff0000" class="w-full h-10 bg-gray-700 p-1 rounded cursor-pointer" oninput="syncPreview()">
                </div>
            </div>

            <button class="w-full mt-8 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-bold transition" onclick="alert('Sinkronisasi ke TikTok Studio Berhasil!')">
                Terapkan ke Live Stream
            </button>
        </aside>

        <!-- Preview Area (Monitor) -->
        <main class="flex-1 flex flex-col items-center justify-center bg-black p-4">
            <h2 class="mb-4 text-gray-400 text-sm uppercase tracking-widest">Live Preview (Capture this window)</h2>
            
            <div id="livePreview" class="preview-area shadow-2xl border-4 border-gray-800 rounded-xl">
                <!-- Simuasi Video Background -->
                <div id="dynamicBg" class="absolute inset-0 flash-sale-bg flex items-center justify-center opacity-50">
                    <span class="text-4xl font-black text-white italic opacity-20">SALE! SALE! SALE!</span>
                </div>

                <!-- Konten Promo -->
                <div class="scarcity-overlay">
                    <h3 id="previewTitle" class="text-2xl font-black uppercase mb-1 tracking-tighter">FLASH SALE TERBATAS!</h3>
                    <p id="previewSub" class="text-sm font-light text-gray-200">Hanya untuk 10 orang pertama!</p>
                    
                    <div class="mt-4 bg-yellow-400 text-black font-bold py-1 px-3 rounded inline-block text-xs animate-bounce">
                        STOK TERSISA: <span id="stockCount">12</span>
                    </div>
                </div>

                <!-- Simulasi Chat/UI TikTok -->
                <div class="absolute top-4 left-4 flex items-center space-x-2">
                    <div class="w-10 h-10 bg-gray-500 rounded-full border-2 border-white"></div>
                    <div>
                        <div class="text-xs font-bold">User_Streamer</div>
                        <div class="bg-black/40 text-[10px] px-2 rounded-full">1.2k Penonton</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function syncPreview() {
            const title = document.getElementById('promoTitle').value;
            const sub = document.getElementById('promoSub').value;
            const color = document.getElementById('bgColor').value;

            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewSub').innerText = sub;
            document.getElementById('dynamicBg').style.background = `linear-gradient(45deg, ${color}, #000)`;
        }

        function updateTemplate() {
            const template = document.getElementById('templateSelect').value;
            const titleInput = document.getElementById('promoTitle');
            const subInput = document.getElementById('promoSub');
            const colorInput = document.getElementById('bgColor');

            if (template === 'flash-sale') {
                titleInput.value = "⚡ FLASH SALE ⚡";
                subInput.value = "Habis dalam 05:00 Menit!";
                colorInput.value = "#ff0000";
            } else if (template === 'promo-gajian') {
                titleInput.value = "💰 PROMO GAJIAN";
                subInput.value = "Diskon up to 70% Khusus Hari Ini";
                colorInput.value = "#008000";
            } else if (template === 'tanggal-tua') {
                titleInput.value = "📉 SOLUSI TANGGAL TUA";
                subInput.value = "Beli 1 Gratis 1 - Tetap Hemat!";
                colorInput.value = "#4b0082";
            }
            
            syncPreview();
        }

        // Simulasi Stok Berkurang
        setInterval(() => {
            let stock = document.getElementById('stockCount');
            let current = parseInt(stock.innerText);
            if(current > 1) stock.innerText = current - 1;
        }, 8000);
    </script>
</body>
</html>
